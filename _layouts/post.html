---
layout: default
---
<h3>{{ page.title }}</h3>
<p class="meta">{{ page.date | date_to_string }} </p>
{% if page.tags %} | 
  {% for tag in page.tags %}
    <a href="{{ site.baseurl }}{{ site.index }}#{{ tag | slugify }}" class="post-tag">{{ tag }}</a>
  {% endfor %}
  {% endif %}
<div class="post">
    {% include ads.html %}<br/>
    {{ content }}
 
  {% include share.html %}<br/>
  
  {% include comments.html %}<br/>
  
  <!--RevenueHits Referrel-->
</div>
