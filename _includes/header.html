<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-102581341-3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-102581341-3');
</script>

<meta property="og:title" content="{{ post.title }}" />
<meta property="og:type" content="article" />

{% if page.header-img %}
    <meta property="og:image" content="{{ site.url }}/{{ page.header-img }}" />
{% else %}
    <meta property="og:image" content="{{ site.url }}/assets/pc1.jpg" />
{% endif %}

<meta property="og:description" content="{{ page.subtitle }}" />

<!-- The Author meta propagates the byline in a number of social networks -->
<meta name="author" content="Programmercave" />

<meta property="fb:app_id" content="389979625280769" />

<meta property="og:locale" content="en_US" />

<meta property="og:site_name" content="Programmercave" />

 <!-- Here my author and publisher tags are the same (yay self-publishing) -->
  <meta property="article:author" content="http://facebook.com/programmercave" />
  <!-- But if your site has its own page, this is where to put it. -->
  <meta property="article:publisher" content="https://www.facebook.com/programmercave" />

<!-- I use the page.tags property for OG tags. -->
  {% for tag in page.tags %}
    <meta property="article:tag" content="{{ tag }}" />
  {% endfor %}

<title>{{ post.title }}</title>
			<!-- link to main stylesheet -->
			<!--<link rel="stylesheet" type="text/css" href="/css/main.css"> -->


<!-- Twitter cards -->
<meta name="twitter:site"    content="@{{ site.twitter_username }}">
<meta name="twitter:creator" content="@{{ site.twitter_username }}">
<meta name="twitter:text:title" content="{{ post.title }}"/>
<!--<meta name="twitter:title"   content="{{ post.title }}"> -->
<meta name="twitter:domain" content="{{ site.url }}" />
<meta name="twitter:url" content=" {{ site.url }} {{ post.url }} " />
{% if page.subtitle %}
<meta name="twitter:description" content="{{ page.subtitle }}">
{% else %}
<meta name="twitter:description" content="{{ site.description }}">
{% endif %}

{% if page.header-img %}
<meta name="twitter:card"  content="summary_large_image">
<meta name="twitter:image:src" content="{{ site.url }}/{{ page.header-img }}">
{% else %}
<meta name="twitter:card"  content="summary">
<meta name="twitter:image:src" content="{{ site.url }}/assets/pc1.jpg">
{% endif %}
<!-- end of Twitter cards -->
