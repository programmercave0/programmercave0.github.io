{% seo %}

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({
          google_ad_client: "ca-pub-6819793054373827",
          enable_page_level_ads: true
     });
</script>
			
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-102581341-3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-102581341-3');
</script>

<!-- Share Buttons -->
<script type="text/javascript" src="https://platform-api.sharethis.com/js/sharethis.js#property=5d9efd7659b23b0012b2b419&product=inline-share-buttons" async="async"></script>

<meta property="og:title" content="Programmercave" />
<meta property="og:type" content="article" />

{% if page.header-img %}
    <meta property="og:image" content="{{ site.url }}/{{ page.header-img }}" />
{% else %}
    <meta property="og:image" content="{{ site.url }}/assets/pc1.jpg" />
{% endif %}

<meta property="og:description" content="{{ page.subtitle }}" />

<!-- The Author meta propagates the byline in a number of social networks -->
<meta name="author" content="Programmercave" />

<meta property="fb:app_id" content="389979625280769" />

<meta property="og:locale" content="en_US" />

<meta property="og:site_name" content="Programmercave" />

 <!-- Here my author and publisher tags are the same (yay self-publishing) -->
  <meta property="article:author" content="http://facebook.com/programmercave" />
  <!-- But if your site has its own page, this is where to put it. -->
  <meta property="article:publisher" content="https://www.facebook.com/programmercave" />

<!-- I use the page.tags property for OG tags. -->
  {% for tag in page.tags %}
    <meta property="article:tag" content="{{tag}}" />
  {% endfor %}

<title>{{ page.title }}</title>
